<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pipeline">
<meta name="theme-color" content="#0a1628">
<title>Parsons Pipeline Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy2: #0f2040;
  --steel: #1a3a5c;
  --accent: #f59e0b;
  --muted: #7a9ab8;
  --text: #e8f0f8;
  --text2: #a0c0d8;
  --green: #22c55e;
  --card-bg: #0f2040;
  --border: rgba(255,255,255,0.08);
  --font: 'Sora', sans-serif;
  --mono: 'DM Mono', monospace;
}
body.day-mode {
  --navy: #f0f4f8;
  --navy2: #dce6f0;
  --steel: #b0c8e0;
  --accent: #d97706;
  --muted: #4a6a88;
  --text: #0a1628;
  --text2: #1a3a5c;
  --green: #16a34a;
  --card-bg: #e4edf6;
  --border: rgba(0,0,0,0.12);
}
body.day-mode body::before { display: none; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
.day-night-btn {
  position: fixed; top: 12px; right: 12px; z-index: 9999;
  background: var(--accent); color: #0a1628;
  border: none; border-radius: 20px;
  padding: 7px 14px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: var(--font);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
body {
  font-family: var(--font);
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

/* Header */
.header {
  background: linear-gradient(160deg, var(--navy2) 0%, var(--steel) 100%);
  padding: 56px 20px 24px;
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.header-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; font-family: var(--mono); }
.header h1 { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.2; }
.header-sub { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

/* Top-level tabs */
.top-tabs {
  display: flex;
  background: var(--navy2);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.top-tab {
  flex: 1; padding: 14px 8px;
  font-size: 12px; font-weight: 700;
  font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); text-align: center;
  cursor: pointer; border: none; background: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  touch-action: manipulation;
  transition: color 0.15s, border-color 0.15s;
}
.top-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.top-tab:active { background: rgba(255,255,255,0.03); }

.view { display: none; }
.view.active { display: block; }

/* Date section */
.date-section { margin: 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.date-inner { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.date-row { display: flex; align-items: center; gap: 10px; }
.date-row label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; min-width: 88px; font-family: var(--mono); }

/* Stepper */
.date-stepper { flex: 1; display: flex; align-items: stretch; background: var(--steel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; height: 48px; }
.step-btn {
  width: 52px; background: transparent; border: none;
  color: var(--accent); font-size: 28px; font-weight: 300;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.1s; touch-action: manipulation;
}
.step-btn:active { background: rgba(245,158,11,0.22); }
.step-sep { width: 1px; background: var(--border); flex-shrink: 0; }
.date-display {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 12px; color: var(--text);
  user-select: none; text-align: center; line-height: 1.35; padding: 0 4px;
}

/* Viewing mode indicator */
.mode-bar { display: none; margin: 0 16px 0; padding: 8px 14px; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: 10px; font-family: var(--mono); font-size: 11px; color: var(--accent); text-align: center; }
.mode-bar.visible { display: block; }

.section-divider { height: 1px; background: var(--border); }
.btn-row { padding: 14px 16px; background: rgba(0,0,0,0.15); }
.btn {
  width: 100%; font-family: var(--font); font-size: 14px; font-weight: 600;
  padding: 14px; border-radius: 10px; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  touch-action: manipulation; transition: opacity 0.15s, transform 0.1s;
  background: linear-gradient(135deg, #065f46, #047857); color: #6ee7b7;
  border: 1px solid rgba(110,231,183,0.2);
}
.btn:active { transform: scale(0.97); opacity: 0.85; }

/* Task cards */
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; font-family: var(--mono); padding: 0 16px; margin-bottom: 8px; }
.cards { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
.task-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.task-card.flash { animation: cardFlash 0.8s ease; }
@keyframes cardFlash { 0% { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); } 100% { border-color: var(--border); box-shadow: none; } }
.task-header { padding: 10px 14px; background: linear-gradient(90deg, var(--steel), var(--navy2)); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
.task-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.task-name { font-size: 13px; font-weight: 600; color: var(--text); }
.fields { display: grid; grid-template-columns: 1fr 1fr; }
.field-group { padding: 12px 14px; border-right: 1px solid var(--border); }
.field-group:last-child { border-right: none; }
.field-group-title { font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; font-family: var(--mono); }
.field-pair { display: flex; flex-direction: column; gap: 8px; }
.field-item { display: flex; flex-direction: column; gap: 3px; }
.field-label { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }

/* Editable inputs */
input.ci {
  width: 100%; font-size: 15px; font-family: var(--mono);
  border: 1px solid var(--border); border-radius: 7px;
  padding: 9px 10px; background: var(--navy); color: var(--text);
  -webkit-appearance: none; transition: border-color 0.15s;
}
input.ci.start { background: rgba(0,0,0,0.3); color: var(--text2); }
input.ci.start:focus { background: var(--navy2); color: var(--text); border-color: var(--accent); }
input.ci:focus { outline: none; border-color: var(--accent); color: var(--text); background: var(--navy2); }

/* Read-only display for history view */
.ci-ro {
  width: 100%; font-size: 15px; font-family: var(--mono);
  border: 1px solid var(--border); border-radius: 7px;
  padding: 9px 10px; color: var(--text2); background: transparent;
  min-height: 38px;
}
.ci-ro.start { color: var(--muted); }
.ci-ro.empty { color: var(--steel); }
.insert-row { display: flex; align-items: center; gap: 8px; padding: 4px 16px; }
.insert-line { flex: 1; height: 1px; background: var(--border); }
.insert-btn { font-size: 11px; font-family: var(--mono); padding: 3px 12px; border-radius: 99px; border: 1px solid rgba(245,158,11,0.25); background: rgba(245,158,11,0.06); color: var(--accent); cursor: pointer; white-space: nowrap; touch-action: manipulation; flex-shrink: 0; }
.insert-btn:active { background: rgba(245,158,11,0.18); }
.del-btn { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0 4px; touch-action: manipulation; line-height: 1; }
.del-btn:active { color: #ef4444; }
input.task-name-input { background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--text); font-family: var(--font); font-size: 13px; font-weight: 600; width: 100%; outline: none; padding: 0; }
input.task-name-input:focus { border-bottom-color: var(--accent); }

/* Card tabs */
.card-tabs { display: flex; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.15); }
.card-tab { flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); text-align: center; cursor: pointer; border: none; background: none; touch-action: manipulation; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
.card-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.card-tab:active { background: rgba(255,255,255,0.03); }
.card-pane { display: none; }
.card-pane.active { display: block; }
textarea.notes-input { width: 100%; min-height: 90px; font-size: 13px; font-family: var(--font); padding: 12px 14px; background: transparent; border: none; color: var(--text); resize: none; outline: none; line-height: 1.5; }
textarea.notes-input::placeholder { color: var(--steel); }
.notes-ro { font-size: 13px; font-family: var(--font); padding: 12px 14px; color: var(--text2); line-height: 1.5; min-height: 50px; white-space: pre-wrap; }
.notes-ro.empty { color: var(--steel); font-style: italic; }

/* General notes card */
.general-notes-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin: 0 16px; }
.general-notes-header { padding: 10px 14px; background: linear-gradient(90deg, var(--steel), var(--navy2)); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
textarea.general-notes-input { width: 100%; min-height: 120px; font-size: 13px; font-family: var(--font); padding: 14px; background: transparent; border: none; color: var(--text); resize: none; outline: none; line-height: 1.6; }
textarea.general-notes-input::placeholder { color: var(--steel); }

/* ── TRACKER TAB STYLES ── */
.tracker-wrap { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

.tracker-header-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
}
.tracker-total-label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.tracker-total-val { font-size: 20px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
.tracker-date-badge { font-size: 11px; font-family: var(--mono); color: var(--text2); text-align: right; line-height: 1.5; }

/* Tracker table */
.tracker-table-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
}
.tracker-table { width: 100%; border-collapse: collapse; }
.tracker-table th {
  font-size: 9px; font-family: var(--mono); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); padding: 8px 6px; text-align: center;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}
.tracker-table th:first-child { text-align: left; padding-left: 12px; }
.tracker-table td {
  font-size: 12px; font-family: var(--mono);
  padding: 9px 6px; text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text2);
  vertical-align: middle;
}
.tracker-table td:first-child { text-align: left; padding-left: 12px; font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--text); }
.tracker-table tr:last-child td { border-bottom: none; }
.tracker-table tr:nth-child(even) td { background: rgba(255,255,255,0.015); }

.pct-green { color: var(--green); font-weight: 700; }
.pct-yellow { color: var(--accent); font-weight: 700; }
.pct-muted { color: var(--muted); font-weight: 600; }

input.pc-input {
  width: 62px; font-size: 13px; font-family: var(--mono);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 5px; background: var(--navy); color: var(--text);
  -webkit-appearance: none; text-align: center;
  transition: border-color 0.15s;
}
input.pc-input.start-inp { background: rgba(0,0,0,0.3); color: var(--text2); }
input.pc-input:focus { outline: none; border-color: var(--accent); background: var(--navy2); }

/* Stats cards below table */
.stat-cards { display: flex; flex-direction: column; gap: 8px; }
.stat-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
  padding: 13px 16px; display: flex; justify-content: space-between; align-items: center;
}
.stat-label { font-size: 12px; color: var(--text); font-weight: 600; }
.stat-sub { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.stat-val { font-size: 22px; font-weight: 700; font-family: var(--mono); }
.stat-val.blue { color: #60a5fa; }
.stat-val.purple { color: #a78bfa; }
.stat-val.orange { color: var(--accent); }

.tracker-save-row { padding: 0 0 4px; }
.tracker-save-btn {
  width: 100%; font-family: var(--font); font-size: 14px; font-weight: 600;
  padding: 14px; border-radius: 10px; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  touch-action: manipulation; transition: opacity 0.15s, transform 0.1s;
  background: linear-gradient(135deg, #1e3a8a, #1d4ed8); color: #bfdbfe;
  border: 1px solid rgba(191,219,254,0.2);
}
.tracker-save-btn:active { transform: scale(0.97); opacity: 0.85; }

.wipe-row { display: flex; gap: 10px; margin-top: 4px; }
.wipe-btn {
  flex: 1; font-family: var(--font); font-size: 12px; font-weight: 600;
  padding: 11px; border-radius: 10px; cursor: pointer;
  touch-action: manipulation; transition: opacity 0.15s;
  border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.07); color: #f87171;
}
.restore-btn {
  flex: 1; font-family: var(--font); font-size: 12px; font-weight: 600;
  padding: 11px; border-radius: 10px; cursor: pointer;
  touch-action: manipulation; transition: opacity 0.15s;
  border: 1px solid rgba(34,197,94,0.3); background: rgba(34,197,94,0.07); color: #4ade80;
}

.overall-bar-wrap {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
  padding: 13px 16px;
}
.overall-bar-label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display: flex; justify-content: space-between; }
.bar-track { height: 8px; background: var(--steel); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #86efac); border-radius: 99px; transition: width 0.4s ease; }
</style>
</head>
<body>
<button class="day-night-btn" onclick="toggleDayNight()" id="dayNightBtn">☀️ Day</button>
<div class="app">

  <div class="header">
    <div class="header-eyebrow">Parsons / Field Report</div>
    <h1>Pipeline Progress</h1>
    <div class="header-sub">Transmission Line Tracker</div>
  </div>

  <!-- Top-level tabs -->
  <div class="top-tabs">
    <button class="top-tab active" onclick="switchTopTab('progress')">Progress</button>
    <button class="top-tab" onclick="switchTopTab('tracker')">PC Tracker</button>
  </div>

  <!-- ══ PROGRESS VIEW ══ -->
  <div class="view active" id="view-progress">

    <div style="height:16px"></div>

    <div class="date-section">
      <div class="date-inner">
        <div class="date-stepper">
          <button class="step-btn" onclick="stepDate(-1)">−</button>
          <div class="step-sep"></div>
          <div class="date-display" id="newDisplay">—</div>
          <div class="step-sep"></div>
          <button class="step-btn" onclick="stepDate(1)">+</button>
        </div>
      </div>
      <div class="section-divider"></div>
      <div class="btn-row">
        <button class="btn" onclick="downloadDoc()">↓ Download report</button>
      </div>
    </div>

    <div class="mode-bar" id="modebar">📋 Viewing saved entry — tap + to return to today</div>

    <div style="height:12px"></div>
    <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;padding-right:16px;">
      Tasks
      <button onclick="addTask(-1)" style="font-family:var(--mono);font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.08);color:var(--accent);cursor:pointer;touch-action:manipulation;">+ Add task</button>
    </div>
    <div class="cards" id="cards"></div>

    <div style="height:16px"></div>
    <div class="section-label" style="padding-left:16px;">General Notes</div>
    <div style="height:6px"></div>
    <div class="general-notes-card">
      <div class="general-notes-header">
        <div class="task-dot"></div>
        <span class="task-name">Site / General Notes</span>
      </div>
      <textarea class="general-notes-input" id="generalNotes" placeholder="Enter general site notes, observations, issues…" oninput="generalNotes=this.value"></textarea>
    </div>

  </div><!-- end progress view -->

  <!-- ══ TRACKER VIEW ══ -->
  <div class="view" id="view-tracker">
    <div class="tracker-wrap">

      <div class="tracker-header-card">
        <div>
          <div class="tracker-total-label">Total PC</div>
          <div class="tracker-total-val" id="tr-total-val">750 PC</div>
        </div>
        <div class="tracker-date-badge" id="tr-date-badge">—</div>
      </div>

      <!-- overall progress bar -->
      <div class="overall-bar-wrap">
        <div class="overall-bar-label">
          <span id="tr-overall-label">Overall lay progress</span>
          <span id="tr-overall-pct">—</span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="tr-bar" style="width:0%"></div></div>
      </div>

      <div class="tracker-table-card">
        <table class="tracker-table" id="tr-table">
          <thead>
            <tr>
              <th>Task</th>
              <th>PC Start</th>
              <th>PC End</th>
              <th>Today</th>
              <th>Avg</th>
              <th>%</th>
            </tr>
          </thead>
          <tbody id="tr-tbody"></tbody>
        </table>
      </div>

      <div class="tracker-save-row">
        <button class="tracker-save-btn" onclick="saveTrackerDay()">💾 Save day</button>
      </div>

      <div class="stat-cards" id="tr-stats"></div>

      <div class="wipe-row">
        <button class="wipe-btn" onclick="wipeTrackerAvg()">🗑 Wipe avg history</button>
        <button class="restore-btn" onclick="restoreTrackerAvg()">↺ Restore avg history</button>
      </div>

    </div>
  </div><!-- end tracker view -->

</div><!-- end app -->

<script>
// ══════════════════════════════════════════════
//  SHARED STATE
// ══════════════════════════════════════════════
const TOTAL_PC = 750;

const DEFAULT_TASK_NAMES = ['Trenching','Pipelay','Welded','Tested','Sleeved','Diapered','Slurry'];

function blankTasks(){
  return DEFAULT_TASK_NAMES.map(name=>({name, stStart:'', stEnd:'', wjStart:'', wjEnd:'', notes:'', pcStart:'', pcEnd:''}));
}

let TASKS = blankTasks();
let generalNotes = '';
const dayLog = [];
let viewIndex = -1;

// Tracker avg history: { taskName -> [daily counts] }
let trackerAvgHistory = {};
let trackerAvgBackup = null;

// ══════════════════════════════════════════════
//  TOP TAB SWITCH
// ══════════════════════════════════════════════
function switchTopTab(which){
  document.querySelectorAll('.top-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelector(`.top-tab[onclick*="${which}"]`).classList.add('active');
  document.getElementById('view-'+which).classList.add('active');
  if(which==='tracker') renderTracker();
}

// ══════════════════════════════════════════════
//  DATE HELPERS
// ══════════════════════════════════════════════
function localMid(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function addDays(d,n){ const r=localMid(d); r.setDate(r.getDate()+n); return r; }
function fmtISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtNice(d){
  const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return D[d.getDay()]+' '+d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear();
}

let currDate, prevDate;

function initDates(){
  const today = localMid(new Date());
  currDate = today;
  prevDate = addDays(today, -1);
  updateDateDisplay();
}

function updateDateDisplay(){
  if(viewIndex === -1){
    document.getElementById('newDisplay').innerText = fmtNice(currDate);
    document.getElementById('modebar').classList.remove('visible');
  } else {
    const e = dayLog[viewIndex];
    document.getElementById('newDisplay').innerText = e.date;
    document.getElementById('modebar').classList.add('visible');
  }
}

// ══════════════════════════════════════════════
//  DATE STEPPER
// ══════════════════════════════════════════════
function stepDate(delta){
  if(viewIndex === -1){
    if(delta === 1){
      saveDayAndAdvance();
    } else {
      if(dayLog.length > 0){
        viewIndex = dayLog.length - 1;
        updateDateDisplay();
        renderCards(dayLog[viewIndex].tasks, true);
      } else {
        currDate = addDays(currDate, -1);
        prevDate = addDays(currDate, -1);
        updateDateDisplay();
      }
    }
  } else {
    if(delta === -1 && viewIndex > 0){
      viewIndex--;
      updateDateDisplay();
      renderCards(dayLog[viewIndex].tasks, true);
    } else if(delta === 1){
      if(viewIndex < dayLog.length - 1){
        viewIndex++;
        updateDateDisplay();
        renderCards(dayLog[viewIndex].tasks, true);
      } else {
        viewIndex = -1;
        updateDateDisplay();
        renderCards(TASKS, false);
      }
    }
  }
}

        <div class="task-header"><div class="task-dot"></div><span class="task-name">${t.name}</span></div>
        <div class="card-tabs">
          <button class="card-tab active" onclick="switchTab(this,'data')">Data</button>

              <div class="field-group-title">Weld / Joint #</div>
              <div class="field-pair">
                <div class="field-item"><div class="field-label">Start</div><div class="ci-ro start ${t.wjStart?'':'empty'}">${t.wjStart||'—'}</div></div>
                <div class="field-item"><div class="field-label">End</div><div class="ci-ro ${t.wjEnd?'':'empty'}">${t.wjEnd||'—'}</div></div>
              </div>
            </div>
          </div>
        </div>
        <div class="card-pane" data-pane="notes">
          <div class="notes-ro ${t.notes?'':'empty'}">${t.notes||'No notes.'}</div>

    } else {

          <div class="task-dot"></div>

          <button class="del-btn" onclick="deleteTask(${i})" title="Remove">✕</button>
        </div>
        <div class="card-tabs">
          <button class="card-tab active" onclick="switchTab(this,'data')">Data</button>
          <button class="card-tab" onclick="switchTab(this,'notes')">Notes</button>
        </div>
        <div class="card-pane active" data-pane="data">
          <div class="fields">
            <div class="field-group">
              <div class="field-group-title">Station</div>
              <div class="field-pair">
                <div class="field-item"><div class="field-label">Start</div><input class="ci start" data-i="${i}" data-f="stStart" value="${t.stStart}" placeholder="—"></div>
                <div class="field-item"><div class="field-label">End</div><input class="ci" data-i="${i}" data-f="stEnd" value="${t.stEnd}" placeholder="enter"></div>
              </div>
            </div>
            <div class="field-group">
              <div class="field-group-title">Weld / Joint #</div>
              <div class="field-pair">
                <div class="field-item"><div class="field-label">Start</div><input class="ci start" data-i="${i}" data-f="wjStart" value="${t.wjStart}" placeholder="—"></div>

    wrap.querySelectorAll('input.ci').forEach(inp=>{
      ['input','change'].forEach(ev=>inp.addEventListener(ev, e=>{

        const field = e.target.dataset.f;
        TASKS[idx][field] = e.target.value;

        if(field === 'wjStart' || field === 'wjEnd'){

function switchTab(btn, pane){
  const card = btn.closest('.task-card');
  card.querySelectorAll('.card-tab').forEach(t=>t.classList.remove('active'));
  card.querySelectorAll('.card-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  card.querySelector('[data-pane="'+pane+'"]').classList.add('active');
}

function addTask(beforeIndex){
  const newTask = {name:'New task', stStart:'', stEnd:'', wjStart:'', wjEnd:'', notes:'', pcStart:'', pcEnd:''};
  if(beforeIndex === -1){
    TASKS.push(newTask);
  } else {
    TASKS.splice(beforeIndex, 0, newTask);
  }
  saveToStorage();
  renderCards(TASKS, false);
  setTimeout(()=>{
    const idx = beforeIndex === -1 ? TASKS.length-1 : beforeIndex;
    const inputs = document.querySelectorAll('input.task-name-input');
    if(inputs[idx]) { inputs[idx].focus(); inputs[idx].select(); }
  }, 50);
}

function deleteTask(i){
  if(TASKS.length <= 1){ alert('Must have at least one task.'); return; }
  if(!confirm('Remove "'+TASKS[i].name+'"?')) return;
  TASKS.splice(i, 1);
  saveToStorage();
  renderCards(TASKS, false);
}

  const genNotesHtml = generalNotes.trim() ? `
    <h3 style="color:#1a3a5c;margin-top:28px;margin-bottom:8px;font-family:Arial;">General Notes</h3>
    <div style="border:1px solid #ccc;border-radius:4px;padding:14px;font-size:13px;line-height:1.6;white-space:pre-wrap;color:#333;">${generalNotes}</div>` : '';

  // ── PC Tracker table rows ──
  const pcRows = activeTasks.map((t,i)=>{
    const start = parseFloat(t.pcStart);
    const end   = parseFloat(t.pcEnd);
    const hasStart = !isNaN(start) && t.pcStart !== '';
    const hasEnd   = !isNaN(end)   && t.pcEnd   !== '';
    const todayCount = (hasStart && hasEnd) ? Math.max(0, end - start) : null;
    const hist = trackerAvgHistory[t.name] || [];
    const avg  = hist.length > 0 ? Math.round(hist.reduce((a,b)=>a+b,0)/hist.length) : null;
    const pct  = hasEnd ? Math.round((end / TOTAL_PC) * 100) : null;
    const pctColor = pct === null ? '#999' : pct >= 66 ? '#16a34a' : pct >= 33 ? '#d97706' : '#64748b';
    const bg = i%2===0 ? '#ffffff' : '#f0f6fc';
    return `<tr style="background:${bg}">
      <td style="${tdStyle}font-weight:600;">${t.name}</td>
      <td style="${tdStyle}text-align:center;font-family:Courier New;">${hasStart ? Math.round(start) : '—'}</td>
      <td style="${tdStyle}text-align:center;font-family:Courier New;">${hasEnd   ? Math.round(end)   : '—'}</td>

      <td style="${tdStyle}text-align:center;font-weight:700;color:${pctColor};">${pct !== null ? pct+'%' : '—'}</td>
    </tr>`;
  }).join('');

  // ── Stats: days remaining + open trench ──
  let statsHtml = '';
  const statItems = [];

  // Days remaining
  activeTasks.forEach(t=>{
    const end  = parseFloat(t.pcEnd);
    const hist = trackerAvgHistory[t.name] || [];
    const avg  = hist.length > 0 ? Math.round(hist.reduce((a,b)=>a+b,0)/hist.length) : null;
    if(avg && avg > 0 && !isNaN(end) && end > 0){
      const days = Math.ceil(Math.max(0, TOTAL_PC - end) / avg);

  if(trenchTask && backTask){

        <span>Overall progress — ${barTask.name}</span><span>${pct}% of ${TOTAL_PC} PC</span>
      </div>
      <div style="background:#e2e8f0;border-radius:99px;height:10px;overflow:hidden;">
        <div style="background:linear-gradient(90deg,#16a34a,#4ade80);height:100%;width:${barW};border-radius:99px;"></div>
      </div>
    </div>`;
  }

  // ── Assemble full document ──
  const html = `<!DOCTYPE html>

  table{border-collapse:collapse;width:100%;}
  .hdr td{background:#1a3a5c;color:#f59e0b;font-weight:bold;padding:8px 10px;border:1px solid #ccc;text-align:center;}
  .sub td{background:#d6e4f0;color:#1a3a5c;font-weight:bold;padding:6px 10px;border:1px solid #ccc;text-align:center;}
  .divider{border:none;border-top:2px solid #1a3a5c;margin:32px 0;}
  .footer{color:#999;font-size:11px;margin-top:24px;border-top:1px solid #e2e8f0;padding-top:10px;}
</style>
</head><body>

<h1>PARSONS</h1>

<div class="dates">Previous date: ${prevStr} &nbsp;|&nbsp; Current date: ${currStr}</div>

    <td rowspan="2" style="vertical-align:middle;text-align:left;">Task</td>
    <td colspan="2">Station</td>

    ${notesHeader}
  </tr>
  <tr class="sub">
    <td>Start</td><td>End</td><td>Start</td><td>End</td>
  </tr>
  ${rows}
</table>

${genNotesHtml}

<hr class="divider">

  <tr class="hdr">

  const blob = new Blob([html], {type:'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Parsons_Pipeline_'+fmtISO(viewIndex===-1?currDate:new Date())+'.doc';

function renderTracker(){
  const tbody = document.getElementById('tr-tbody');
  tbody.innerHTML = '';

  const dateLabel = viewIndex === -1 ? fmtNice(currDate) : dayLog[viewIndex].date;
  document.getElementById('tr-date-badge').innerHTML = dateLabel.replace(' ', '<br>');

  TASKS.forEach((t, i)=>{
    // PC Start/End derived from Weld/Joint Start/End (same numbers)
    const pcStart = t.wjStart !== '' ? t.wjStart : t.pcStart;
    const pcEnd   = t.wjEnd   !== '' ? t.wjEnd   : t.pcEnd;
    t.pcStart = pcStart;
    t.pcEnd   = pcEnd;
    const start = parseFloat(pcStart) || 0;
    const end   = parseFloat(pcEnd)   || 0;
    const today = (pcStart !== '' && pcEnd !== '') ? Math.max(0, end - start) : null;

    // Build avg from history
    const hist = trackerAvgHistory[t.name] || [];
    const avg = hist.length > 0 ? Math.round(hist.reduce((a,b)=>a+b,0) / hist.length) : null;

    // % = pcEnd / TOTAL_PC
    const pctVal = end > 0 ? Math.round((end / TOTAL_PC) * 100) : null;
    let pctClass = 'pct-muted';
    if(pctVal !== null){ pctClass = pctVal >= 66 ? 'pct-green' : pctVal >= 33 ? 'pct-yellow' : 'pct-muted'; }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${t.name}</td>
      <td><input class="pc-input start-inp" data-i="${i}" data-f="pcStart" value="${pcStart}" placeholder="—" inputmode="numeric" onfocus="this.select()"></td>
      <td><input class="pc-input" data-i="${i}" data-f="pcEnd" value="${pcEnd}" placeholder="—" inputmode="numeric" onfocus="this.select()"></td>
      <td>${today !== null ? today : '—'}</td>
      <td>${avg !== null ? avg : '—'}</td>
      <td class="${pctClass}">${pctVal !== null ? pctVal+'%' : '—'}</td>
    `;
    tbody.appendChild(tr);
  });

  // Wire inputs — update derived cells only, never re-render whole table during typing
  tbody.querySelectorAll('input.pc-input').forEach(inp=>{
    ['input','change'].forEach(ev=>inp.addEventListener(ev, e=>{
      const i = +e.target.dataset.i;
      TASKS[i][e.target.dataset.f] = e.target.value;

      // Update only the derived cells (Today, Avg, %) in this row
      const row = e.target.closest('tr');
      const t = TASKS[i];
      const start = parseFloat(t.pcStart) || 0;
      const end   = parseFloat(t.pcEnd)   || 0;
      const today = (t.pcStart !== '' && t.pcEnd !== '') ? Math.max(0, end - start) : null;
      const hist  = trackerAvgHistory[t.name] || [];
      const avg   = hist.length > 0 ? Math.round(hist.reduce((a,b)=>a+b,0) / hist.length) : null;
      const pctVal = end > 0 ? Math.round((end / TOTAL_PC) * 100) : null;
      let pctClass = 'pct-muted';
      if(pctVal !== null){ pctClass = pctVal >= 66 ? 'pct-green' : pctVal >= 33 ? 'pct-yellow' : 'pct-muted'; }

      const cells = row.querySelectorAll('td');
      cells[3].textContent = today !== null ? today : '—';
      cells[4].textContent = avg   !== null ? avg   : '—';
      cells[5].className   = pctClass;
      cells[5].textContent = pctVal !== null ? pctVal+'%' : '—';

      renderTrackerStats();
    }));
  });

  renderTrackerStats();
}

function renderTrackerStats(){
  const statsEl = document.getElementById('tr-stats');
  statsEl.innerHTML = '';

  // Find trench and backfill tasks by name (case-insensitive)
  let trenchTask = null, backfillTask = null;
  TASKS.forEach(t=>{
    const n = t.name.toLowerCase();
    if(n.includes('trench')) trenchTask = t;
    if(n.includes('back')) backfillTask = t;
  });

  // Days remaining per task (based on avg)
  const daysCards = [];
  TASKS.forEach(t=>{
    const end = parseFloat(t.pcEnd) || 0;
    const hist = trackerAvgHistory[t.name] || [];
    const avg = hist.length > 0 ? Math.round(hist.reduce((a,b)=>a+b,0) / hist.length) : null;
    if(avg && avg > 0 && end > 0){
      const remaining = Math.max(0, TOTAL_PC - end);
      const days = Math.ceil(remaining / avg);
      daysCards.push({name: t.name, days, sub: `Based on ${t.name} daily avg`});
    }
  });

  // Show up to 2 most relevant (Lay / Backfill style — use Trench and Pipelay if present)
  const priority = ['pipelay','lay','trench','back'];
  daysCards.sort((a,b)=>{
    const ai = priority.findIndex(p=>a.name.toLowerCase().includes(p));
    const bi = priority.findIndex(p=>b.name.toLowerCase().includes(p));
    return (ai===-1?99:ai) - (bi===-1?99:bi);
  });

  const colors = ['blue','purple'];
  daysCards.slice(0,2).forEach((c,idx)=>{
    const div = document.createElement('div');
    div.className = 'stat-card';
    div.innerHTML = `
      <div>
        <div class="stat-label">Days remaining — ${c.name}</div>
        <div class="stat-sub">${c.sub}</div>
      </div>
      <div class="stat-val ${colors[idx]}">${c.days} days</div>
    `;
    statsEl.appendChild(div);
  });

  // Open trench gap
  if(trenchTask && backfillTask){
    const tEnd = parseFloat(trenchTask.pcEnd) || 0;
    const bEnd = parseFloat(backfillTask.pcEnd) || 0;
    const gap = Math.max(0, tEnd - bEnd);
    const ftGap = gap * 40; // ~40ft per PC is typical — adjust if needed
    if(tEnd > 0 || bEnd > 0){
      const div = document.createElement('div');
      div.className = 'stat-card';
      div.innerHTML = `
        <div>
          <div class="stat-label">Open trench — Trench vs Back fill</div>
          <div class="stat-sub">Trench PC ${Math.round(tEnd)} — Back fill PC ${Math.round(bEnd)}</div>
        </div>
        <div class="stat-val orange">${gap} PC<br><span style="font-size:13px;color:var(--muted)">${ftGap.toLocaleString()} ft</span></div>
      `;
      statsEl.appendChild(div);
    }
  }

  // Overall progress bar (use Lay/Pipelay if present, else first task with pcEnd)
  let barTask = TASKS.find(t=>t.name.toLowerCase().includes('lay')) ||
                TASKS.find(t=>parseFloat(t.pcEnd) > 0);
  if(barTask){
    const pct = Math.min(100, Math.round(((parseFloat(barTask.pcEnd)||0) / TOTAL_PC) * 100));
    document.getElementById('tr-bar').style.width = pct + '%';
    document.getElementById('tr-overall-pct').textContent = pct + '%';
    document.getElementById('tr-overall-label').textContent = `Overall progress — ${barTask.name}`;
  }
}

function saveTrackerDay(){
  try {
    // Accumulate today's PC counts into avg history
    TASKS.forEach(t=>{
      const start = parseFloat(t.pcStart);
      const end   = parseFloat(t.pcEnd);
      if(!isNaN(start) && !isNaN(end) && t.pcEnd !== ''){
        const count = Math.max(0, end - start);
        if(!trackerAvgHistory[t.name]) trackerAvgHistory[t.name] = [];
        trackerAvgHistory[t.name].push(count);
      }
    });
    // Carry pcEnd → pcStart, clear pcEnd
    TASKS.forEach(t=>{
      t.pcStart = t.pcEnd;
      t.pcEnd = '';
    });
    saveToStorage();
    renderTracker();
    // Flash confirmation
    const btn = document.querySelector('.tracker-save-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ Saved!';
    btn.style.background = 'linear-gradient(135deg,#065f46,#047857)';
    btn.style.color = '#6ee7b7';
    setTimeout(()=>{ btn.textContent = orig; btn.style.background=''; btn.style.color=''; }, 1500);
  } catch(err) {
    alert('Save error: ' + err.message);
  }
}

function wipeTrackerAvg(){
  if(!confirm('Wipe all daily average history for every task?')) return;
  trackerAvgBackup = JSON.parse(JSON.stringify(trackerAvgHistory));
  trackerAvgHistory = {};
  saveToStorage();
  renderTracker();
}

function restoreTrackerAvg(){
  if(!trackerAvgBackup){ alert('No backup available.'); return; }
  trackerAvgHistory = JSON.parse(JSON.stringify(trackerAvgBackup));
  saveToStorage();
  renderTracker();
}

// ══════════════════════════════════════════════
//  LOCAL STORAGE — auto-save & auto-load
// ══════════════════════════════════════════════
const STORAGE_KEY = 'parsons_pipeline_v1';

function saveToStorage(){
  try {
    const payload = {
      tasks: TASKS,
      avgHistory: trackerAvgHistory,
      avgBackup: trackerAvgBackup,
      currDate: fmtISO(currDate),
      prevDate: fmtISO(prevDate)
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  } catch(e){ /* storage not available — silent fail */ }
}

function loadFromStorage(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const payload = JSON.parse(raw);
    if(payload.tasks && Array.isArray(payload.tasks)){
      // Merge saved tasks — preserve structure, fill in pcStart for carry-forward
      TASKS = payload.tasks.map(t=>({
        name:    t.name    || 'Task',
        stStart: t.stStart || '',
        stEnd:   t.stEnd   || '',
        wjStart: t.wjStart || '',
        wjEnd:   t.wjEnd   || '',
        notes:   t.notes   || '',
        pcStart: t.pcStart || '',
        pcEnd:   t.pcEnd   || ''
      }));
    }
    if(payload.avgHistory) trackerAvgHistory = payload.avgHistory;
    if(payload.avgBackup)  trackerAvgBackup  = payload.avgBackup;
    if(payload.currDate){
      const parts = payload.currDate.split('-');
      currDate = new Date(+parts[0], +parts[1]-1, +parts[2]);
    }
    if(payload.prevDate){
      const parts = payload.prevDate.split('-');
      prevDate = new Date(+parts[0], +parts[1]-1, +parts[2]);
    }
    return true;
  } catch(e){ return false; }
}

// Auto-save whenever task data changes
function saveDayAndAdvance(){
  dayLog.push({
    prevDate: fmtNice(prevDate),
    date:     fmtNice(currDate),
    tasks:    TASKS.map(t=>({...t}))
  });
  const moved = [];
  TASKS.forEach((t,i)=>{
    if(t.stEnd||t.wjEnd) moved.push(i);
    t.stStart = t.stEnd;  t.stEnd  = '';
    t.wjStart = t.wjEnd;  t.wjEnd  = '';
    t.pcStart = t.pcEnd;  t.pcEnd  = '';
  });
  prevDate = localMid(currDate);
  currDate = addDays(currDate, 1);
  viewIndex = -1;
  saveToStorage();
  updateDateDisplay();
  renderCards(TASKS, false);
  if(moved.length){
    document.querySelectorAll('.task-card').forEach((el,i)=>{
      if(moved.includes(i)) el.classList.add('flash');
      setTimeout(()=>el.classList.remove('flash'), 900);
    });
  }
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
initDates();
const restored = loadFromStorage();
if(restored) updateDateDisplay();
renderCards(TASKS, false);

function toggleDayNight(){
  const isDay = document.body.classList.toggle('day-mode');
  document.getElementById('dayNightBtn').textContent = isDay ? '🌙 Night' : '☀️ Day';
  try { localStorage.setItem('parsons_theme', isDay ? 'day' : 'night'); } catch(e){}
}

// Restore saved theme on load
try {
  if(localStorage.getItem('parsons_theme') === 'day'){
    document.body.classList.add('day-mode');
    document.getElementById('dayNightBtn').textContent = '🌙 Night';
  }
} catch(e){}
</script>
